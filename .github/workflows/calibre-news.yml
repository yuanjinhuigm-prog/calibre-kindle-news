name: Calibre Auto Push BBC+NYT News to Kindle
on:
  schedule:
    - cron: '0 23 * * *'  # UTC 23:00 = Beijing 07:00 (adjust as needed)
  workflow_dispatch:      # Manual trigger for testing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Install Calibre (latest version to avoid recipe compatibility issues)
      - name: Install Latest Calibre
        run: |
          sudo apt update && sudo apt install -y calibre --no-install-recommends

      # Step 2: Create Enhanced Multi-Source News Recipe (fixes the warning)
      - name: Create Robust Multi-Source Recipe
        run: |
          cat > bbc_nyt_news.recipe << 'EOF'
          from calibre.web.feeds.news import BasicNewsRecipe
          from calibre.web.feeds import FeedParser
          import re

          class EnhancedMultiSourceNews(BasicNewsRecipe):
              # Core recipe settings (resolve multi-source warnings)
              title = 'BBC + NYT Daily News'
              description = 'Combined BBC Global & NYT World News (Multi-Source)'
              language = 'en'
              oldest_article = 1  # Only fetch 1 day of articles
              max_articles_per_feed = 15  # Limit per source (avoid large files)
              auto_cleanup = True
              remove_empty_feeds = True  # Critical: Skip empty RSS sources
              normalize_feeds = True     # Critical: Standardize multi-source formatting
              
              # Multi-source RSS feeds (BBC + NYT) — add/remove lines here
              feeds = [
                  ('BBC Global News', 'https://feeds.bbci.co.uk/news/rss.xml'),
                  ('BBC World News', 'https://feeds.bbci.co.uk/news/world/rss.xml'),
                  ('NYT HomePage', 'https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml'),
                  ('NYT World News', 'https://rss.nytimes.com/services/xml/rss/nyt/World.xml'),
              ]

              # Fix: Custom parser for multi-source content cleaning (avoids broken formatting)
              def parse_article(self, url, soup, fallback):
                  # Clean BBC content
                  if 'bbci.co.uk' in url:
                      main_content = soup.find('div', class_='story-body__inner')
                      if main_content:
                          return self.extract_content(main_content)
                  # Clean NYT content
                  elif 'nytimes.com' in url:
                      main_content = soup.find('article', class_='story-wrapper')
                      if main_content:
                          return self.extract_content(main_content)
                  # Fallback for other sources
                  return super().parse_article(url, soup, fallback)

              # Fix: Ensure multi-source feeds are parsed correctly
              def get_feeds(self):
                  feeds = super().get_feeds()
                  # Filter invalid/empty feeds (key for multi-source stability)
                  valid_feeds = []
                  for feed in feeds:
                      if feed.get('entries') and len(feed['entries']) > 0:
                          valid_feeds.append(feed)
                  return valid_feeds
          EOF

      # Step 3: Fetch News & Send to Kindle (163 Email Optimized)
      - name: Fetch News and Send to Kindle
        env:
          FROM_EMAIL: "yuanjinhui163@163.com"       # e.g., 123456@163.com
          FROM_PASSWORD: "PFybNB5jUm5JzHyy"   # 163 SMTP auth code (NOT login password)
          TO_EMAIL: "yuanjinhui@kindle.com"   # e.g., abc123@kindle.com
          SMTP_SERVER: "smtp.163.com"                  # Fixed for 163 email
          SMTP_PORT: "465"                             # Fixed for 163 email (SSL)
        run: |
          # Convert recipe to Kindle-compatible MOBI (force English encoding)
          ebook-convert bbc_nyt_news.recipe bbc_nyt_news.mobi \
            --language en \
            --remove-paragraph-spacing \
            --enable-heuristics  # Fix multi-source formatting issues

          # Install ssmtp (email client)
          sudo apt-get update && sudo apt-get install -y ssmtp

          # Configure ssmtp for 163 email (SSL enabled)
          sudo bash -c 'cat > /etc/ssmtp/ssmtp.conf << EOF
          root=$FROM_EMAIL
          mailhub=$SMTP_SERVER:$SMTP_PORT
          AuthUser=$FROM_EMAIL
          AuthPass=$FROM_PASSWORD
          UseTLS=YES
          UseSTARTTLS=YES
          FromLineOverride=YES
          EOF'

          # Send email with MOBI attachment (fix multi-source encoding issues)
          echo "Subject: BBC+NYT News $(date +%Y-%m-%d)
          MIME-Version: 1.0
          Content-Type: application/x-mobipocket-ebook; charset=utf-8; name=\"bbc_nyt_news.mobi\"
          Content-Disposition: attachment; filename=\"bbc_nyt_news.mobi\"
          Content-Transfer-Encoding: base64
          " | cat - <(base64 bbc_nyt_news.mobi) | ssmtp $TO_EMAIL
