name: Calibre Auto Push BBC+NYT News to Kindle
on:
  # Schedule: UTC 23:00 = Beijing 07:00 (adjust as needed)
  schedule:
    - cron: '0 23 * * *'
  # Manual trigger (for testing)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Install Calibre (Ubuntu environment)
      - name: Install Calibre
        run: |
          sudo -v && wget -nv -O- https://download.calibre-ebook.com/linux.sh | sudo sh

      # Step 2: Create Calibre News Recipe (BBC + NYT RSS)
      - name: Create Multi-Source News Recipe
        run: |
          cat > bbc_nyt_news.recipe << 'EOF'
          from calibre.web.feeds.news import BasicNewsRecipe
          class BBCNYTNews(BasicNewsRecipe):
              title = 'BBC + NYT Daily News'
              description = 'BBC Global News + New York Times World News'
              language = 'en'
              oldest_article = 1  # Only fetch 1 day of articles
              max_articles_per_feed = 15  # 15 articles per RSS source (avoid large files)
              auto_cleanup = True
              # RSS Sources (BBC + NYT)
              feeds = [
                  ('BBC Global News', 'https://feeds.bbci.co.uk/news/rss.xml'),
                  ('BBC World News', 'https://feeds.bbci.co.uk/news/world/rss.xml'),
                  ('NYT HomePage', 'https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml'),
                  ('NYT World News', 'https://rss.nytimes.com/services/xml/rss/nyt/World.xml'),
              ]
              # Clean up redundant content (keep only main text)
              keep_only_tags = [
                  dict(name='div', attrs={'class': 'story-body__inner'}),  # BBC main content
                  dict(name='article', attrs={'class': 'story-wrapper'}),   # NYT main content
              ]
          EOF

      # Step 3: Fetch news & send to Kindle (163 email config)
      - name: Fetch News and Send to Kindle
        env:
          # Replace these with your own 163 email/Kindle info
          FROM_EMAIL: "yuanjinhui163@163.com"       # e.g., 123456@163.com
          FROM_PASSWORD: "PFybNB5jUm5JzHyy"   # 163 email SMTP auth code (NOT login password)
          TO_EMAIL: "yuanjinhui@kindle.com"   # e.g., abc123@kindle.com
          SMTP_SERVER: "smtp.163.com"                  # Fixed for 163 email
          SMTP_PORT: "465"                             # Fixed for 163 email (SSL)
        run: |
          # Convert recipe to Kindle-compatible MOBI format
          ebook-convert bbc_nyt_news.recipe bbc_nyt_news.mobi --language en
          
          # Install ssmtp for email sending
          sudo apt-get update && sudo apt-get install -y ssmtp
          
          # Configure ssmtp for 163 email
          sudo bash -c 'cat > /etc/ssmtp/ssmtp.conf << EOF
          root=$FROM_EMAIL
          mailhub=$SMTP_SERVER:$SMTP_PORT
          AuthUser=$FROM_EMAIL
          AuthPass=$FROM_PASSWORD
          UseTLS=YES
          UseSTARTTLS=YES
          FromLineOverride=YES
          EOF'
          
          # Send email with MOBI attachment to Kindle
          echo "Subject: BBC+NYT News $(date +%Y-%m-%d)
          MIME-Version: 1.0
          Content-Type: application/x-mobipocket-ebook; name=\"bbc_nyt_news.mobi\"
          Content-Disposition: attachment; filename=\"bbc_nyt_news.mobi\"
          " | ( cat -; base64 bbc_nyt_news.mobi ) | ssmtp $TO_EMAIL
